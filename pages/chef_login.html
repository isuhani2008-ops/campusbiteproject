<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CampusBite | Chef Login</title>

    <link rel="stylesheet" href="../css/chef.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

</head>

<body class="login-page">

    <!-- Background Overlay -->
    <div class="overlay"></div>

    <!-- LOGIN BOX -->
    <div class="login-box">

        <h1 class="brand-name">CampusBite</h1>

        <img src="https://cdn-icons-png.flaticon.com/512/1995/1995574.png" class="chef-logo">

        <h2>Chef Portal Login</h2>

        <p class="quote">
            "Great food is the foundation of genuine happiness 🍽"
        </p>

        <input type="text" id="chefUser" placeholder="Enter Username">

        <input type="password" id="chefPass" placeholder="Enter Password">

        <!-- FIXED BUTTON -->
        <button onclick="chefLogin()">Login to Kitchen</button>

    </div>

<script src="../js/chef.js"></script>

</body>
</html>
