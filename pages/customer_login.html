<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campusbite | Customer Login</title>
    <link rel="stylesheet" href="../css/customer_login.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>
<body class="light-mode">

<!-- Theme Toggle -->
<div class="theme-toggle" onclick="toggleTheme()">🌙</div>

<!-- Login Container -->
<div class="login-container">

    <!-- Brand -->
    <h1 class="brand">Campusbite</h1>

    <!-- Logo -->
    <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png" class="logo">

    <!-- Heading -->
    <h2>Welcome Back!</h2>

    <!-- Tagline -->
    <p class="tagline">"Order fast. Eat fresh. Enjoy more."</p>

    <!-- Inputs -->
    <input type="text" id="username" placeholder="Enter Username">
<input type="password" id="password" placeholder="Enter Password">

    <!-- Buttons -->
    <button onclick="customerLogin()">Login</button>
    <p class="signup-text">New here? <a href="customer_signup.html">Sign Up</a></p>
</div>
<script src="../js/customer.js"></script>




</body>
</html>
