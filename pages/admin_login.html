<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Canteen | Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin_login.css">
</head>
<body>

    <!-- Login Container -->
    <div class="login-wrapper">
        <div class="login-box">
            <h1 class="brand">Smart Canteen</h1>
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="admin-logo" alt="Admin Logo">

            <h2>Admin Portal Login</h2>
            <p class="tagline">"Manage Smart. Serve Better. Grow Faster."</p>

            <input type="text" id="adminUser" placeholder="Enter Username">
            <input type="password" id="adminPass" placeholder="Enter Password">

            <button onclick="adminLogin()">Login to Dashboard</button>
            
        </div>
    </div>

    <script src="../js/admin.js"></script>
</body>
</html>
